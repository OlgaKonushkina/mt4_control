name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Remove serial plugin for CI (temporary)
        run: |
          sed -i '/flutter_libserialport/d' pubspec.yaml
          flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test